      .garnet { fill: #a8233f; }
      .gold { fill: #efc43a; }
      .cyan { fill: #82c8c4; }
      .coral { fill: #ef7e68; }
      .black { fill: #101014; }
      .cream { fill: #fff7ee; }
    </style>
  </defs>

  <rect class="paper" width="1600" height="2400"/>

